name: Prepare Mood Journal 1.0.3

on:
  push:
    branches:
      - release/1.0.3

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release/1.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Update release metadata
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          manifest.version = '1.0.3';
          fs.writeFileSync('manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);

          const versions = { '1.0.3': manifest.minAppVersion };
          fs.writeFileSync('versions.json', `${JSON.stringify(versions, null, 2)}\n`);
          NODE
          npm version 1.0.3 --no-git-tag-version
      - name: Commit release metadata
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add manifest.json package.json package-lock.json versions.json
          git commit -m "Release Mood Journal 1.0.3"
          git push origin HEAD:release/1.0.3
