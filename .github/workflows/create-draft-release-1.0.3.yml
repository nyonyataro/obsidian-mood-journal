name: Create Mood Journal 1.0.3 draft release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.event.head_commit.message == 'Create Mood Journal 1.0.3 draft release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: 1.0.3
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: 1.0.3
          draft: true
          name: Mood Journal 1.0.3
          body: |
            ## Fixed
            - Keep the journal memo field visible on Android when the software keyboard opens.
          files: |
            main.js
            manifest.json
            styles.css
      - name: Record successful draft creation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_id="$(gh api repos/${GITHUB_REPOSITORY}/releases/tags/1.0.3 --jq '.id')"
          git fetch origin main:refs/remotes/origin/main
          git switch -C main origin/main
          printf 'Draft release 1.0.3 created successfully (release ID: %s).\n' "$release_id" > .github/release-1.0.3-ready.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/release-1.0.3-ready.txt
          git commit -m "Record 1.0.3 draft release creation"
          git push origin HEAD:main
