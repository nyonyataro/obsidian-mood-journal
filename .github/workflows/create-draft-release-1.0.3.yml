name: Create Mood Journal 1.0.3 draft release

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.event.pull_request.title == 'Create Mood Journal 1.0.3 draft release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: 1.0.3
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: 1.0.3
          draft: true
          name: Mood Journal 1.0.3
          body: |
            ## Fixed
            - Keep the journal memo field visible on Android when the software keyboard opens.
          files: |
            main.js
            manifest.json
            styles.css
